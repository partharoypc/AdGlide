plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'maven-publish'
}

android {
    namespace 'com.partharoypc.adglide'
    compileSdk 36
    defaultConfig {
        minSdk 23
        targetSdk 36
        versionCode 7
        versionName "1.7.0"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        encoding 'UTF-8'
    }
    buildFeatures {
        buildConfig = true
    }
    kotlinOptions {
        jvmTarget = "17"
    }
    lint {
        disable 'GradleDependency'
    }

    publishing {
        singleVariant('release')
    }
}

dependencies {

    implementation fileTree(dir: 'libs', include: ['*.aar', '*.jar'], exclude: [])
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'com.google.android.material:material:1.13.0'


    //Primary Ad Networks
    compileOnly 'com.google.android.gms:play-services-ads:25.0.0'
    compileOnly 'com.facebook.android:audience-network-sdk:6.21.0'
    compileOnly 'com.google.ads.mediation:facebook:6.21.0.1'
    compileOnly 'com.facebook.infer.annotation:infer-annotation:0.18.0'

    // Secondary Ad Networks
    compileOnly 'com.unity3d.ads:unity-ads:4.17.0'
    compileOnly 'com.applovin:applovin-sdk:13.6.1'
    compileOnly 'com.unity3d.ads-mediation:mediation-sdk:9.3.0'
    compileOnly 'com.startapp:inapp-sdk:5.3.0'
    compileOnly 'com.wortise:android-sdk:1.7.2'

    // GDPR & Consent
    api 'com.google.android.ump:user-messaging-platform:4.0.0'

    // android-gif-drawable for 16KB alignment support
    //noinspection Aligned16KB
    compileOnly 'pl.droidsonroids.gif:android-gif-drawable:1.2.31'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = "com.github.partharoypc"
                artifactId = "adglide"
                version = "1.7.0"

                pom {
                    name = "AdGlide"
                    description = "Simple ad library for Android with multiple ad networks"
                    url = "https://github.com/partharoypc/AdGlide"
                }
            }
        }
    }
}
